<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تم الطلب ✅ — A3M Print</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .success-page {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      background: var(--bg);
    }
    .success-card {
      background: var(--bg2); border-radius: 24px;
      border: 1px solid var(--border);
      padding: 3rem 2.5rem; text-align: center;
      max-width: 520px; width: 100%;
      box-shadow: 0 30px 80px rgba(0,0,0,.2);
      position: relative; overflow: hidden;
    }
    .success-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
    }
    .success-icon { font-size: 5rem; margin-bottom: 1.2rem; animation: pop .6s cubic-bezier(.17,.67,.4,1.3); }
    @keyframes pop { 0%{transform:scale(0) rotate(-10deg)} 80%{transform:scale(1.15) rotate(3deg)} 100%{transform:scale(1) rotate(0)} }
    .confetti { position: absolute; top: 0; left: 0; right: 0; pointer-events: none; overflow: hidden; height: 200px; }
    .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall 3s ease-in forwards; }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(220px) rotate(720deg); opacity: 0; }
    }
    .success-logo { font-family: 'Permanent Marker', cursive; font-size: 2rem; color: var(--txt); margin-bottom: .4rem; }
    .gold-line { height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: .8rem auto; width: 100px; }
    .success-title { font-family: 'Permanent Marker', cursive; font-size: 1.6rem; color: var(--txt); margin: .5rem 0; }
    .success-msg { font-size: 14px; color: var(--txt2); line-height: 1.9; margin: .7rem 0 1.5rem; }
    .success-steps {
      display: flex; justify-content: center; gap: 1rem;
      margin: 1.2rem 0; flex-wrap: wrap;
    }
    .success-step {
      display: flex; flex-direction: column; align-items: center; gap: .3rem;
      font-size: 11px; color: var(--txt3); max-width: 90px;
    }
    .success-step-icon { font-size: 1.5rem; }
    .success-step-txt { font-weight: 600; }
    .success-step-arrow { font-size: .9rem; color: var(--gold); align-self: center; padding-top: 0; }
    .btn-home {
      display: inline-block; background: var(--accent); color: #fff !important;
      border: none; padding: 13px 30px; border-radius: 10px;
      font-weight: 700; font-size: 14px; text-decoration: none;
      cursor: pointer; transition: .25s; margin-top: .5rem;
      box-shadow: 0 4px 15px var(--abg);
    }
    .btn-home:hover { background: var(--accent2); transform: translateY(-2px); box-shadow: 0 8px 25px var(--abg); }
    .btn-secondary {
      display: inline-block; background: none; color: var(--gold) !important;
      border: 2px solid var(--gold); padding: 11px 24px; border-radius: 10px;
      font-weight: 700; font-size: 14px; text-decoration: none;
      cursor: pointer; transition: .25s; margin-top: .5rem; margin-right: .5rem;
    }
    .btn-secondary:hover { background: var(--gold); color: #111 !important; }
    .order-id-box {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; padding: .7rem 1rem;
      margin: .8rem 0;
      display: flex; align-items: center; justify-content: space-between;
      gap: .5rem;
    }
    .order-id-label { font-size: 11px; color: var(--txt3); font-weight: 600; }
    .order-id-val { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
    .whatsapp-btn {
      display: inline-flex; align-items: center; gap: .5rem;
      background: #25d366; color: #fff !important;
      border: none; padding: 10px 20px; border-radius: 10px;
      font-weight: 700; font-size: 13px; cursor: pointer; transition: .2s;
      text-decoration: none; margin-top: .4rem;
    }
    .whatsapp-btn:hover { background: #1ebe5d; }
  </style>
</head>
<body class="blue-dark">
<script>(function(){ var t=localStorage.getItem("a3m_theme")||"blue-dark"; document.body.className=t; })();</script>

<div class="success-page">
  <div class="success-card">
    <!-- Confetti (JS will add pieces) -->
    <div class="confetti" id="confetti"></div>

    <div class="success-icon">✅</div>
    <div class="success-logo">A<span class="r">3</span><span class="g">M</span></div>
    <div class="gold-line"></div>
    <div class="success-title">تم استلام طلبك! ✦</div>

    <!-- Order ID -->
    <div class="order-id-box">
      <span class="order-id-label">رقم الطلب</span>
      <span class="order-id-val" id="orderId">#A3M----</span>
    </div>

    <p class="success-msg">
      شكراً على ثقتك بـ <strong>A3M Print</strong> ✦<br>
      سيتواصل معك فريقنا خلال <strong>24 ساعة</strong><br>
      لتأكيد التفاصيل وتحديد موعد التسليم.
    </p>

    <!-- Process steps -->
    <div class="success-steps">
      <div class="success-step">
        <div class="success-step-icon">✅</div>
        <div class="success-step-txt">تأكيد الطلب</div>
      </div>
      <div class="success-step-arrow">→</div>
      <div class="success-step">
        <div class="success-step-icon">🎨</div>
        <div class="success-step-txt">مراجعة التصميم</div>
      </div>
      <div class="success-step-arrow">→</div>
      <div class="success-step">
        <div class="success-step-icon">🖨️</div>
        <div class="success-step-txt">الطباعة</div>
      </div>
      <div class="success-step-arrow">→</div>
      <div class="success-step">
        <div class="success-step-icon">🚚</div>
        <div class="success-step-txt">التوصيل</div>
      </div>
    </div>

    <!-- Actions -->
    <div style="margin-top:1rem">
      <a class="whatsapp-btn" href="https://wa.me/213555000000" target="_blank">
        💬 تواصل عبر WhatsApp
      </a>
    </div>
    <div style="margin-top:.5rem;display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap">
      <a class="btn-secondary" href="../index.html">← العودة للمتجر</a>
      <a class="btn-home" href="../index.html" onclick="window.scrollTo(0,0)">🛍️ تسوّق أكثر</a>
    </div>
  </div>
</div>

<script>
  // Generate order ID
  const orderId = '#A3M-' + Math.random().toString(36).substring(2,8).toUpperCase();
  const el = document.getElementById('orderId');
  if (el) el.textContent = orderId;

  // Confetti animation
  (function() {
    const colors = ['#c9a84c','#2563eb','#7c3aed','#ef4444','#22c55e','#f59e0b','#06b6d4'];
    const container = document.getElementById('confetti');
    if (!container) return;
    for (let i = 0; i < 40; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.cssText = [
        'left:' + Math.random() * 100 + '%',
        'background:' + colors[i % colors.length],
        'animation-delay:' + (Math.random() * 2) + 's',
        'animation-duration:' + (2 + Math.random() * 2) + 's',
        'width:' + (6 + Math.random() * 8) + 'px',
        'height:' + (6 + Math.random() * 8) + 'px',
        'border-radius:' + (Math.random() > .5 ? '50%' : '2px'),
      ].join(';');
      container.appendChild(piece);
    }
  })();
</script>
</body>
</html>
